<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRUCTURE – School Behavioural Accountability Platform</title>
<style>
:root {
  --navy: #0D1B3E;
  --navy-mid: #1A2F5E;
  --teal: #0A8A7A;
  --teal-light: #0CB49E;
  --teal-faint: #E6F7F5;
  --amber: #E8A020;
  --red: #C0392B;
  --red-faint: #FEF2F0;
  --green: #16A34A;
  --green-faint: #F0FDF4;
  --sky: #2563EB;
  --text: #1E293B;
  --muted: #64748B;
  --border: #E2E8F0;
  --bg: #F8FAFC;
  --white: #FFFFFF;
  --radius: 8px;
  --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
  --shadow-lg: 0 4px 24px rgba(0,0,0,.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

/* ── SIDEBAR ── */
#sidebar {
  position: fixed; top: 0; left: 0; width: 220px; height: 100vh;
  background: var(--navy); display: flex; flex-direction: column; z-index: 100;
  transition: transform .25s;
}
.sidebar-logo { padding: 20px 18px 14px; border-bottom: 1px solid rgba(255,255,255,.1); }
.sidebar-logo .logo-mark { font-size: 20px; font-weight: 800; color: var(--white); letter-spacing: .5px; }
.sidebar-logo .logo-sub { font-size: 10px; color: rgba(255,255,255,.45); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.nav-section { padding: 16px 0 4px 18px; font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: rgba(255,255,255,.35); font-weight: 600; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 18px; cursor: pointer; color: rgba(255,255,255,.65); font-size: 13px; font-weight: 500; transition: background .15s, color .15s; border-radius: 0; }
.nav-item:hover { background: rgba(255,255,255,.07); color: var(--white); }
.nav-item.active { background: var(--teal); color: var(--white); }
.nav-item .icon { font-size: 16px; width: 18px; text-align: center; }
.sidebar-bottom { margin-top: auto; border-top: 1px solid rgba(255,255,255,.08); padding: 14px 18px; }
.user-chip { display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--teal); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: var(--white); flex-shrink: 0; }
.user-name { font-size: 13px; font-weight: 600; color: var(--white); }
.user-role { font-size: 11px; color: rgba(255,255,255,.45); }
.logout-btn { margin-top: 10px; width: 100%; padding: 7px; border: 1px solid rgba(255,255,255,.15); background: transparent; color: rgba(255,255,255,.6); border-radius: 6px; cursor: pointer; font-size: 12px; }
.logout-btn:hover { background: rgba(255,255,255,.08); color: var(--white); }

/* ── MAIN ── */
#main { margin-left: 220px; min-height: 100vh; display: flex; flex-direction: column; }
.topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.page-title { font-size: 16px; font-weight: 700; color: var(--navy); }
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.content { padding: 28px; flex: 1; }

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── CARDS & GRID ── */
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
.card-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 14px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }

/* ── STAT CARDS ── */
.stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); }
.stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
.stat-val { font-size: 32px; font-weight: 800; color: var(--navy); }
.stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
.stat-chip { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-top: 6px; }
.chip-up { background: var(--green-faint); color: var(--green); }
.chip-down { background: var(--red-faint); color: var(--red); }
.chip-neutral { background: #EFF6FF; color: var(--sky); }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s; }
.btn:hover { opacity: .88; }
.btn-primary { background: var(--teal); color: var(--white); }
.btn-navy { background: var(--navy); color: var(--white); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-danger { background: var(--red); color: var(--white); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-amber { background: var(--amber); color: var(--white); }

/* ── TAGS ── */
.tag { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.tag-discipline { background: #FEE2E2; color: #991B1B; }
.tag-merit { background: #D1FAE5; color: #065F46; }
.tag-warning { background: #FEF3C7; color: #92400E; }
.tag-internal { background: #EFF6FF; color: #1D4ED8; }
.tag-public { background: #F0FDF4; color: var(--green); }
.tag-open { background: #FEF3C7; color: #92400E; }
.tag-resolved { background: #D1FAE5; color: #065F46; }
.tag-escalated { background: #FEE2E2; color: #991B1B; }
.tag-grade { background: var(--teal-faint); color: var(--teal); }

/* ── TABLE ── */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th { text-align: left; padding: 10px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); font-weight: 600; border-bottom: 2px solid var(--border); }
.data-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg); }
.table-wrap { overflow-x: auto; }

/* ── FORM ── */
.form-row { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--white); }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(10,138,122,.12); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ── INCIDENTS FEED ── */
.incident-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px; box-shadow: var(--shadow); }
.incident-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.incident-student { font-weight: 700; font-size: 14px; color: var(--navy); }
.incident-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.incident-desc { font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 10px; }
.ai-plan { background: #EFF6FF; border-radius: 6px; padding: 12px 14px; margin-top: 10px; }
.ai-plan-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--sky); margin-bottom: 8px; }
.ai-step { display: flex; gap: 8px; margin-bottom: 6px; font-size: 12px; }
.ai-step-num { width: 20px; height: 20px; background: var(--sky); color: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.comments-section { border-top: 1px solid var(--border); margin-top: 12px; padding-top: 12px; }
.comment { display: flex; gap: 10px; margin-bottom: 10px; }
.comment-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--navy-mid); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; color: var(--white); flex-shrink: 0; }
.comment-body { background: var(--bg); border-radius: 6px; padding: 8px 12px; flex: 1; font-size: 12px; }
.comment-author { font-weight: 700; font-size: 11px; margin-bottom: 2px; color: var(--navy); }
.comment-input-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.comment-input { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-family: inherit; }

/* ── STUDENT PROFILE ── */
.student-hero { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%); border-radius: var(--radius); padding: 24px; color: var(--white); display: flex; gap: 20px; align-items: center; margin-bottom: 18px; }
.student-avatar-lg { width: 60px; height: 60px; border-radius: 50%; background: var(--teal); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: var(--white); flex-shrink: 0; }
.student-hero-name { font-size: 20px; font-weight: 800; }
.student-hero-sub { font-size: 13px; color: rgba(255,255,255,.6); margin-top: 2px; }
.progress-bar-wrap { background: rgba(255,255,255,.15); border-radius: 4px; height: 6px; margin-top: 8px; width: 160px; }
.progress-bar-fill { height: 100%; border-radius: 4px; background: var(--teal-light); }

/* ── MODAL ── */
#modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
#modal-overlay.open { display: flex; }
.modal { background: var(--white); border-radius: 12px; padding: 28px; width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal-title { font-size: 18px; font-weight: 800; color: var(--navy); margin-bottom: 20px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

/* ── AI BOX ── */
.ai-loading { background: #EFF6FF; border-radius: 6px; padding: 14px; margin: 12px 0; }
.ai-loading-text { font-size: 12px; color: var(--sky); font-style: italic; }
.ai-result { background: #EFF6FF; border-radius: 6px; padding: 14px; margin: 12px 0; }
.ai-result-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--sky); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

/* ── LOGIN ── */
#login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--navy); }
.login-box { width: 420px; }
.login-brand { text-align: center; margin-bottom: 36px; }
.login-brand .brand-name { font-size: 36px; font-weight: 900; color: var(--white); letter-spacing: 2px; }
.login-brand .brand-tagline { font-size: 13px; color: rgba(255,255,255,.5); margin-top: 4px; }
.login-card { background: var(--white); border-radius: 12px; padding: 30px; }
.login-card h2 { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
.login-card p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.role-btn { width: 100%; padding: 13px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--white); cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; transition: border-color .15s, background .15s; }
.role-btn:hover { border-color: var(--teal); background: var(--teal-faint); }
.role-icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.role-text-name { font-weight: 700; font-size: 14px; color: var(--navy); }
.role-text-desc { font-size: 12px; color: var(--muted); }

/* ── FORUM ── */
.forum-post { border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px; background: var(--white); }
.forum-post-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.forum-post-meta { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.forum-post-body { font-size: 13px; line-height: 1.6; margin-bottom: 10px; }
.forum-stats { display: flex; gap: 14px; font-size: 12px; color: var(--muted); }

/* ── CHARTS ── */
.mini-bar-wrap { display: flex; flex-direction: column; gap: 8px; }
.mini-bar-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.mini-bar-label { width: 80px; color: var(--muted); text-align: right; flex-shrink: 0; }
.mini-bar-track { flex: 1; background: var(--bg); border-radius: 4px; height: 8px; }
.mini-bar-fill { height: 100%; border-radius: 4px; }
.mini-bar-val { width: 28px; color: var(--text); font-weight: 600; text-align: right; flex-shrink: 0; }

/* ── ALERTS / BANNERS ── */
.alert { border-radius: 6px; padding: 12px 14px; font-size: 13px; margin-bottom: 14px; }
.alert-info { background: #EFF6FF; color: #1D4ED8; border-left: 4px solid #2563EB; }
.alert-warn { background: #FFFBEB; color: #92400E; border-left: 4px solid var(--amber); }
.alert-success { background: var(--green-faint); color: #065F46; border-left: 4px solid var(--green); }

/* ── TABS ── */
.tab-bar { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
.tab { padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab.active { color: var(--teal); border-bottom-color: var(--teal); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── PAGE HEADER ── */
.page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; }
.page-header-text h1 { font-size: 22px; font-weight: 800; color: var(--navy); }
.page-header-text p { font-size: 13px; color: var(--muted); margin-top: 3px; }

/* ── UTILS ── */
.flex { display: flex; } .items-center { align-items: center; } .gap-10 { gap: 10px; } .gap-14 { gap: 14px; }
.mt-14 { margin-top: 14px; } .mt-20 { margin-top: 20px; } .mb-14 { margin-bottom: 14px; } .mb-20 { margin-bottom: 20px; }
.text-muted { color: var(--muted); font-size: 12px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.avatar-sm { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; color: var(--white); flex-shrink: 0; }
.search-bar { padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; width: 220px; }
.search-bar:focus { outline: none; border-color: var(--teal); }
.badge { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 10px; background: var(--red); color: var(--white); font-size: 10px; font-weight: 700; }
</style>
</head>

  <div class="login-box">

      <div class="brand-name">STRUCTURE</div>

</div>

<!-- APP SHELL -->
<div id="app-shell" style="display:none;">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">STRUCTURE</div>
      <div class="logo-sub">Accountability Platform</div>
    </div>

      </div>
      <button class="logout-btn" onclick="logout()">⇠ Switch Role</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div class="topbar">
      <div class="page-title" id="topbar-title">Dashboard</div>
      <div class="topbar-actions">
        <input type="text" class="search-bar" placeholder="🔍  Search students, incidents…" oninput="globalSearch(this.value)" id="global-search">
        <div style="position:relative;">
          <button class="btn btn-outline btn-sm" onclick="showNotifs()">🔔 Notifications <span class="badge">3</span></button>
        </div>
      </div>
    </div>
    <div class="content" id="page-content"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal" id="modal-body"></div>
</div>

    { id:'i1', studentId:'s1', type:'discipline', visibility:'internal', desc:'Sipho was found with a mobile phone during a written exam. When asked to surrender the device, he became verbally confrontational and disrupted the test environment for approximately 12 minutes.', aiPlan:['Separate Sipho from the exam hall immediately to de-escalate. Assign a supervised area.','Conduct a private "Why" conversation within 24 hours to understand the motivation (cheating, anxiety, distraction).','Apply a logical consequence: a zero for the relevant section with an opportunity for a supplementary test.','Issue a formal written warning to the parent detailing the infraction and the school\'s examination policy.','Schedule a check-in after two weeks to monitor behaviour.'], author:'Mrs. Dlamini', date:'2025-06-05', status:'open', comments:[{author:'Mr. Pretorius',text:'I had a similar issue with Sipho last term. His anxiety before exams is notable—worth a counsellor referral.'},{author:'Admin',text:'Parent has been notified. Meeting scheduled for Friday.'}] },

function loginAs(role) {
  state.role = role;
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app-shell').style.display = 'block';
  buildSidebar();
  navigate('dashboard');
}
function logout() {
  state.role = null;
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('app-shell').style.display = 'none';
}

const USER_META = {
  admin:   { name:'Principal Khumalo', role:'Administrator', avatar:'PK', avatarBg:'#0A8A7A' },
  teacher: { name:'Mrs. S. Dlamini', role:'Grade 10 Maths', avatar:'SD', avatarBg:'#2563EB' },
  parent:  { name:'Mr. James Khumalo', role:'Parent / Guardian', avatar:'JK', avatarBg:'#E8A020' },
};

function buildSidebar() {
  const m = USER_META[state.role];
  document.getElementById('sidebar-avatar').textContent = m.avatar;
  document.getElementById('sidebar-avatar').style.background = m.avatarBg;
  document.getElementById('sidebar-name').textContent = m.name;
  document.getElementById('sidebar-role').textContent = m.role;

  const links = NAV_CONFIG[state.role];
  const nav = document.getElementById('nav-links');
  nav.innerHTML = '<div class="nav-section">Menu</div>' + links.map(k =>
    `<div class="nav-item" id="nav-${k}" onclick="navigate('${k}')">`+
    `<span class="icon">${NAV_ICONS[k]}</span>${NAV_LABELS[k]}</div>`
  ).join('');
}

function navigate(screen) {
  state.screen = screen;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+screen);
  if (navEl) navEl.classList.add('active');
  document.getElementById('topbar-title').textContent = NAV_LABELS[screen] || screen;
  const content = document.getElementById('page-content');
  const RENDERERS = { dashboard: renderDashboard, incidents: renderIncidents, students: renderStudents, classes: renderClasses, forum: renderForum, reports: renderReports, settings: renderSettings };
  content.innerHTML = '';
  if (RENDERERS[screen]) RENDERERS[screen](content);
}

function renderIncidents(el) {

  }

  el.innerHTML = `
    <div class="page-header">
      <div class="page-header-text"><h1>Incidents & Merits</h1><p>${incidents.length} records ${state.role==='parent'?'visible to you':''}</p></div>

    </div>
    <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;">
      <button class="btn btn-outline btn-sm" onclick="filterIncidents('all',this)">All</button>
      <button class="btn btn-outline btn-sm" onclick="filterIncidents('discipline',this)">Discipline</button>
      <button class="btn btn-outline btn-sm" onclick="filterIncidents('merit',this)">Merits</button>
      <button class="btn btn-outline btn-sm" onclick="filterIncidents('open',this)">Open</button>
      <button class="btn btn-outline btn-sm" onclick="filterIncidents('escalated',this)">Escalated</button>
    </div>
    <div id="incidents-list">${incidents.map(renderIncidentCard).join('')}</div>`;
}

function renderIncidentCard(inc) {
  const s = MOCK.students[inc.studentId];
  const canComment = state.role !== 'parent';
  const canSeeAI = state.role !== 'parent';
  const canSeeInternal = state.role !== 'parent';
  if (!canSeeInternal && inc.visibility === 'internal') return '';

  const comments = inc.comments || [];
  const aiSteps = inc.aiPlan;

  return `<div class="incident-card" id="inc-card-${inc.id}">
    <div class="incident-header">
      <div>
        <div class="incident-student">${s.name}</div>
        <div class="incident-meta">Reported by ${inc.author} · ${inc.date} · <span class="tag tag-${inc.status}">${inc.status}</span></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">
        <span class="tag tag-${inc.type}">${inc.type}</span>
        ${canSeeInternal?`<span class="tag tag-${inc.visibility}">${inc.visibility}</span>`:''}
      </div>
    </div>
    <div class="incident-desc">${inc.desc}</div>
    ${canSeeAI && aiSteps ? `<div class="ai-plan">
      <div class="ai-plan-title">🤖 STRUCTURE AI Action Plan</div>
      ${aiSteps.map((step,i)=>`<div class="ai-step"><div class="ai-step-num">${i+1}</div><div>${step}</div></div>`).join('')}
    </div>` : ''}
    ${canComment && comments.length>0 ? `<div class="comments-section">
      <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;">STAFF COMMENTS (${comments.length})</div>
      ${comments.map(c=>`<div class="comment"><div class="comment-avatar">${c.author.split(' ').map(w=>w[0]).join('').substring(0,2)}</div>
        <div class="comment-body"><div class="comment-author">${c.author}</div>${c.text}</div></div>`).join('')}
    </div>`:''}
    ${canComment?`<div class="comment-input-row" style="margin-top:10px;">
      <input type="text" class="comment-input" id="comment-${inc.id}" placeholder="Add a professional note or advice for colleagues…">
      <button class="btn btn-primary btn-sm" onclick="submitComment('${inc.id}')">Post</button>
    </div>`:''}
  </div>`;
}

function filterIncidents(filter, btn) {
  document.querySelectorAll('#incidents-list ~ div, .btn-outline').forEach(b=>b.style && (b.style.borderColor=''));
  let incidents = MOCK.incidents;
  if (state.role==='parent') incidents = incidents.filter(i=>i.studentId==='s1'&&i.visibility==='public');
  if (filter==='discipline'||filter==='merit') incidents = incidents.filter(i=>i.type===filter);
  if (filter==='open'||filter==='escalated') incidents = incidents.filter(i=>i.status===filter);
  document.getElementById('incidents-list').innerHTML = incidents.map(renderIncidentCard).join('') || '<p class="text-muted">No records found.</p>';
}

function submitComment(incId) {
  const inp = document.getElementById('comment-'+incId);
  const text = inp.value.trim();
  if (!text) return;
  const inc = MOCK.incidents.find(i=>i.id===incId);
  if (!inc) return;
  const authorName = USER_META[state.role].name;
  inc.comments.push({ author: authorName, text });
  inp.value = '';
  navigate('incidents');
}

        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Type</label>
        <select class="form-select" id="log-type">
          <option value="discipline">Discipline Issue</option>

        </select>
      </div>
    </div>
    <div class="form-row-2">

        <label class="form-label">Visibility</label>
        <select class="form-select" id="log-vis">
          <option value="internal">Internal (Staff only)</option>
          <option value="public">Public (Parent can see)</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Severity</label>
        <select class="form-select" id="log-severity">
          <option>Low</option><option selected>Medium</option><option>High</option><option>Critical</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Incident Description</label>
      <textarea class="form-textarea" id="log-desc" rows="4" placeholder="Provide an objective, factual description of what occurred…" oninput="updateAIPreview()"></textarea>
    </div>
    <button class="btn btn-navy" style="margin-bottom:14px;width:100%" onclick="generateAIPlan()">🤖 Generate AI Action Plan</button>
    <div id="ai-plan-result" style="display:none"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitLog()">Submit Record</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

let generatedPlan = null;

function generateAIPlan() {
  const desc = document.getElementById('log-desc').value.trim();
  const type = document.getElementById('log-type').value;
  if (!desc) { alert('Please enter a description first.'); return; }

  const box = document.getElementById('ai-plan-result');
  box.style.display = 'block';
  box.innerHTML = '<div class="ai-loading"><div class="ai-loading-text">🔄 Analysing situation and generating action plan…</div></div>';

  const plans = {
    discipline: [
      'De-escalate immediately by calmly removing the learner from the environment.',
      'Conduct a private "Why" conversation within 24 hours — understand the root cause without placing immediate blame.',
      'Apply a logical, proportionate consequence directly related to the action.',
      'Notify the parent/guardian with a factual written summary of the incident.',
      'Schedule a follow-up check-in within 10 school days to monitor behaviour.',
    ],
    merit: [
      'Acknowledge the positive behaviour publicly in front of the class.',
      'Award merit points and log the achievement in the school record.',
      'Notify the parent/guardian with a positive communication.',
      'Consider nominating the learner for a school award or recognition programme.',
    ],
    warning: [
      'Schedule an immediate meeting with the learner and the head of year.',
      'Identify root causes: home circumstances, learning barriers, peer dynamics.',
      'Create a 30-day academic recovery plan with weekly checkpoints.',
      'Loop in the school counsellor if emotional or social factors are suspected.',
      'Set a re-assessment date and communicate expectations clearly in writing.',
    ],
  };

  setTimeout(()=>{
    generatedPlan = plans[type] || plans.discipline;
    box.innerHTML = `<div class="ai-result">
      <div class="ai-result-header">🤖 STRUCTURE AI Action Plan</div>
      ${generatedPlan.map((s,i)=>`<div class="ai-step"><div class="ai-step-num">${i+1}</div><div style="font-size:13px">${s}</div></div>`).join('')}
      <div style="font-size:11px;color:var(--muted);margin-top:10px;">Generated from ${Math.floor(Math.random()*1200)+800} similar incidents across the STRUCTURE network.</div>
    </div>`;
  }, 1400);
}

function submitLog() {
  const studentId = document.getElementById('log-student').value;
  const type = document.getElementById('log-type').value;
  const vis = document.getElementById('log-vis').value;
  const desc = document.getElementById('log-desc').value.trim();
  if (!studentId || !desc) { alert('Student and description are required.'); return; }

  const newInc = {
    id: 'i'+Date.now(), studentId, type, visibility: vis,
    desc, aiPlan: generatedPlan,
    author: USER_META[state.role].name,
    date: new Date().toISOString().split('T')[0],
    status: 'open', comments: []
  };
  MOCK.incidents.unshift(newInc);
  MOCK.students[studentId].incidents.push(newInc.id);
  if (type==='discipline') MOCK.students[studentId].points = Math.max(0, MOCK.students[studentId].points - 5);
  if (type==='merit') MOCK.students[studentId].points = Math.min(100, MOCK.students[studentId].points + 5);
  generatedPlan = null;
  closeModal();
  navigate('incidents');
}
